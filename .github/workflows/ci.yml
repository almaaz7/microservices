name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma clients
        run: |
          npx prisma generate --schema=services/user-service/prisma/schema.prisma
          npx prisma generate --schema=services/product-service/prisma/schema.prisma
          npx prisma generate --schema=services/order-service/prisma/schema.prisma

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Typecheck all workspaces
        run: npm run typecheck

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-typecheck

    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - product-service
          - order-service
          - api-gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: ${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
